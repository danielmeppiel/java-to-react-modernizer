name: java-to-react-modernizer
version: 0.1.0
description: >-
  Verification-gated, security-reviewed migration of a Java application
  (Spring/JSP/Stripes/servlets) to React/JavaScript. Ships an
  orchestrator skill, cost-bound worker agents (planner / implementer /
  security lenses / synth), deterministic build+SAST gates, and a
  Copilot App workflow trigger.
author: danielmeppiel
license: MIT
dependencies:
  apm: []
  mcp: []
includes: auto
scripts: {}
marketplace:
  owner:
    name: danielmeppiel
    url: https://github.com/danielmeppiel

  # Default tag pattern used to resolve version ranges for each package.
  build:
    tagPattern: "v{version}"

  # Output targets (map form). 'claude' is enabled by default;
  # uncomment 'codex' below to publish the Codex artifact too.
  # Each output writes to its profile default path; add 'path:'
  # under a key to override.
  outputs:
    claude: {}
    # codex: {}
    #
    # Note: enabling codex requires every package below to declare
    # 'category:' (e.g. category: Productivity).

  # CI tip: build one or all formats with a machine-readable manifest:
  #   apm pack --marketplace=claude,codex --json | jq -r '.marketplace.outputs[].path'

  packages:
    - name: java-to-react-modernizer
      description: >-
        Verification-gated, security-reviewed migration of a legacy Java
        application to React/JavaScript. Ships the orchestrator skill,
        cost-bound worker agents, and deterministic build+SAST gates.
      source: danielmeppiel/java-to-react-modernizer
      version: "^0.1.0"
